syntax = "proto3";
option go_package = "github.com/smartcontractkit/capabilities/mock/internal/pb";

package mockcap;


import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";


service MockCapability {
  // Retrieve information about all capabilities available on the node
  rpc List(ListRequest) returns (ListResponse){}

  // Retrieve unique workflow IDs of subscribers for a specific trigger
  rpc GetTriggerSubscribers(GetTriggerSubscribersRequest) returns (GetTriggerSubscribersResponse){}

  // Create a mock capability and register it with the node
  rpc CreateCapability(CapabilityInfo) returns(google.protobuf.Empty) {}

  // Remove a mock capability
  rpc RemoveCapability(RemoveCapabilityRequest) returns(google.protobuf.Empty) {}

  // Send data through a mock trigger
  rpc SendTriggerEvent(SendTriggerEventRequest) returns(google.protobuf.Empty) {}

  // Subscribe to a trigger (includes all triggers, not limited to mock triggers),
  // creates a stream that send trigger events
  rpc RegisterTrigger(TriggerRegistrationRequest) returns(stream TriggerResponse) {}

  // Unsubscribe from a trigger (includes all triggers, not limited to mock triggers)
  rpc UnregisterTrigger(TriggerRegistrationRequest) returns(google.protobuf.Empty) {}//NOOP

  // Establish a bidirectional streaming service. When Execute is called, it streams requests and allows streaming responses back
  rpc HookExecutables(stream ExecutableResponse) returns(stream ExecutableRequest) {}

  // Subscribe to a workflow (includes all executable capabilities, not limited to mocks)
  rpc RegisterToWorkflow(RegisterToWorkflowRequest) returns (google.protobuf.Empty){}

  // Unsubscribe from a workflow (includes all executable capabilities, not limited to mocks)
  rpc UnregisterFromWorkflow(UnregisterFromWorkflowRequest) returns (google.protobuf.Empty){}

  // Invoke the Execute method on an executable capability (includes all executable capabilities, not limited to mocks)
  rpc Execute(ExecutableRequest) returns (CapabilityResponse){}
}

message TriggerEvent{
  string TriggerType = 1;
  string ID = 2;
  bytes Outputs = 3;
}

message TriggerResponse{
  TriggerEvent TriggerEvent = 1;
  string Error = 2;
}

message GetTriggerSubscribersRequest{
  string ID = 1;
}

message GetTriggerSubscribersResponse{
  repeated string WorkflowIDs = 1;
}

message TriggerRegistrationRequest{
  string TriggerID = 1;
  Metadata Metadata = 2;
  bytes Config = 3;
  google.protobuf.Any Payload = 4;
  string Method = 5;
  string RegistrationTriggerID =6;
}


message Metadata{
  string WorkflowID = 1;
  string WorkflowOwner = 2;
  string WorkflowExecutionID = 3;
  string WorkflowName = 4;
  uint32 WorkflowDonID = 5;
  uint32 WorkflowDonConfigVersion = 6;
  string ReferenceID = 7;
  string DecodedWorkflowName = 8;
  repeated SpendLimit SpendLimit = 9;
}

message ListRequest {}
message ListResponse {
  repeated CapabilityInfo capInfos = 1;
}
enum CapabilityType {
  Unknown = 0;
  Trigger = 1;
  Action = 2;
  Consensus = 3;
  Target = 4;
}
message DON{

}
message CapabilityInfo{
  string ID = 1;
  CapabilityType CapabilityType = 2;
  string Description = 3;
  DON DON = 4;
  bool IsLocal = 5;
}

message SendTriggerEventRequest{
  string TriggerID = 1;
  string TriggerType = 2;
  string ID = 3;
  bytes Outputs = 5;
  google.protobuf.Any Payload = 6;
  OCRTriggerEvent  OCREvent = 7;

}
message OCRTriggerEvent{
  bytes ConfigDigest = 1;
  uint64   SeqNr = 2;
  bytes   Report = 3;
  repeated OCRAttributedOnchainSignature  Sigs = 4;
}

message OCRAttributedOnchainSignature{
  bytes Signature = 1;
  uint32 Signer = 2;
}



message RegisterToWorkflowRequest{
  string ID = 1;
  CapabilityType CapabilityType = 2;
  RegistrationMetadata RegistrationMetadata = 3;
  bytes Config = 4;
}

message RegistrationMetadata{
  string WorkflowID = 1;
  string WorkflowOwner = 2;
  string ReferenceID = 3;
}

message UnregisterFromWorkflowRequest{
  RegistrationMetadata RegistrationMetadata = 1;
  bytes Config = 2;
}

message ExecutableRequest{
  string ID = 1;
  CapabilityType CapabilityType = 2;
  Metadata RequestMetadata = 3;
  bytes Config = 4;
  bytes Inputs = 5;
  google.protobuf.Any Payload = 6;
  google.protobuf.Any ConfigPayload = 7;
  string Method = 8;
  string CapabilityId = 9;
}

message SpendLimit{
  string SpendType = 1;
  string Limit = 2;
}

message CapabilityResponse{
  bytes Value = 1;
}

message ExecutableResponse{
  string ID = 1;
  CapabilityType CapabilityType = 2;
  bytes Value = 3;
}

message RemoveCapabilityRequest{
  string ID = 1;
}