syntax = "proto3";
package chain_capabilities.stellar;
option go_package = "github.com/smartcontractkit/capabilities/chain_capabilities/stellar/monitoring;monitoring";

import "libs/monitoring/execution_context.proto";

// WriteReportRequest intentionally captures only the non-sensitive subset of the
// capability request that is useful for monitoring (no raw report bytes or signatures).
message WriteReportRequest {
  string contract_id = 1;
  uint64 report_size = 2;
  uint32 sigs_count = 3;
}

message WriteReportInitiated {
  WriteReportRequest req = 1;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportSuccess {
  WriteReportRequest req = 1;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportError {
  WriteReportRequest req = 1;
  string summary = 2;
  string cause = 3;
  bool is_user_error = 4;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportTxInfoRetrievalError {
  WriteReportRequest req = 1;
  string summary = 2;
  string cause = 3;
  string tx_hash = 4;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportInvalidTransmissionState {
  WriteReportRequest req = 1;
  string summary = 2;
  string cause = 3;
  uint32 transmission_state = 4;
  bool invalid_receiver = 5;
  bool success = 6;
  string transmission_id = 7;
  string transmitter = 8;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportDuplicateTx {
  WriteReportRequest req = 1;
  string duplicate_tx_hash = 2;
  string canonical_tx_hash = 3;
  monitoring.ExecutionContext execution_context = 20;
}

message WriteReportSuccessfulEarlyReturn {
  monitoring.ExecutionContext execution_context = 20;
}
