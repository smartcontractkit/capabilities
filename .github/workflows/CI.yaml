name: CI

on: [push]

env:
  GO_VERSION: 1.23

jobs:
  affected-projects:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.get-affected.outputs.affected }}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # 5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/.github/actions/**/*.yml"
      - name: Cache NX
        uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
        with:
          path: |
            .nx
            ~/.npm
          key: ${{ runner.os }}
      - run: npx nx@19.8.2 init # nx version is 19.8.2
      - name: Get base branch
        id: get-base
        run: echo "base=${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }}" >> "$GITHUB_OUTPUT"
      - name: Get affected projects
        id: get-affected
        run: echo "affected=$(./nx show projects --affected --json --base=${{steps.get-base.outputs.base}})" >> "$GITHUB_OUTPUT"

  build:
    needs: affected-projects
    if: ${{ needs.affected-projects.outputs.affected != '[]' && needs.affected-projects.outputs.affected != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected-projects.outputs.affected)}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup
      - name: Build ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} build

  test:
    needs: affected-projects
    if: ${{ needs.affected-projects.outputs.affected != '[]' && needs.affected-projects.outputs.affected != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected-projects.outputs.affected)}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup
      - name: Test ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} test

  tidy-and-generate:
    needs: affected-projects
    if: ${{ needs.affected-projects.outputs.affected != '[]' && needs.affected-projects.outputs.affected != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected-projects.outputs.affected)}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup
      - name: Install mockery
        run: go install github.com/vektra/mockery/v2/...@v2.46.1

      - name: Run "tidy" and "generate"
        run: |
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} tidy
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} generate
      - name: Ensure no diff
        run: git diff --stat --exit-code

  lint:
    needs: affected-projects
    if: ${{ needs.affected-projects.outputs.affected != '[]' && needs.affected-projects.outputs.affected != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected-projects.outputs.affected)}}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache NX
        uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
        with:
          path: |
            .nx
            ~/.npm
          key: ${{ runner.os }}
      - run: npx nx@19.8.2 init # nx version is 19.8.2
      - id: get-root
        run: echo "root=$(./nx show project ${{matrix.projects}} --json)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{fromJson(steps.get-root.outputs.root).root}}/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: ${{fromJson(steps.get-root.outputs.root).root}}

  checks:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - test
      - tidy-and-generate
    if: always()
    steps:
      - name: All tests ok
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Some tests failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
