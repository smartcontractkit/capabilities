name: CI

on: [push]

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  affected-projects:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.get-affected.outputs.affected }}
      base: ${{ steps.get-base.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - run: npx nx init
        shell: bash

      - name: Get base branch
        id: get-base
        run: echo "base=${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }}" >> "$GITHUB_OUTPUT"
      - name: Get affected projects
        id: get-affected
        run: echo "affected=$(./nx show projects --affected --json --base=${{steps.get-base.outputs.base}})" >> "$GITHUB_OUTPUT"

  affected-tasks:
    needs: affected-projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected-projects.outputs.affected)}}
        tasks: ["lint", "test"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup

      # Special setup for golangci-lint to make use of their action features
      - name: Get project root
        if: ${{ matrix.tasks }} == 'lint'
        id: get-root
        run: echo "root=$(./nx show project ${{matrix.projects}} --json)" >> "$GITHUB_OUTPUT"
      - name: golangci-lint
        if: ${{ matrix.tasks }} == 'lint'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: ${{fromJson(steps.get-root.outputs.root).root}}

      # Other tasks
      - name: ${{ matrix.tasks }} ${{ matrix.projects }}
        if: ${{ matrix.tasks }} != 'lint'
        run: ./nx run ${{ matrix.projects }}:${{ matrix.tasks }} --base=${{needs.affected-projects.outputs.base}}
