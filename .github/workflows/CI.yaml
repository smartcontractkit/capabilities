name: CI

on: [push]

env:
  GO_VERSION: 1.23

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      nx: ${{ steps.affected.outputs.affected }}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"
      - name: Cache NX
        uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
        with:
          path: |
            .nx
            ~/.npm
          key: ${{ runner.os }}-nx
        # Outputs:
        # {
        #   "base": "main",
        #   "projects": [
        #     "project_name_1",
        #     "project_name_2",
        #   ],
        #   "project_name_1": {
        #     "root": "project_1_root",
        #     "go_sum": "project_1_root/go.sum"
        #   },
        #   "project_name_2": {
        #     "root": "project_2_root",
        #     "go_sum": "project_2_root/go.sum"
        #   }
        #   "run_checks": true
        # }
      - name: Init NX and get affected projects
        id: affected
        run: |
          npx nx@19.8.2 init
          echo "affected=$(./.github/scripts/affected-projects.sh ${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }})" >> $GITHUB_OUTPUT

  build:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "build"

      - name: Build ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} build

  test:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "test"

      - name: Test ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} test

  tidy-and-generate:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "tidy-and-generate"

      - name: Install mockery
        run: go install github.com/vektra/mockery/v2/...@v2.46.1

      - name: Run "tidy" and "generate"
        run: |
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} tidy
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} generate
      - name: Ensure no diff
        run: git diff --stat --exit-code

  lint:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0
      - name: Set up project environment
        id: setup
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "lint"

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: ${{fromJson(needs.affected.outputs.nx)[matrix.projects].root}}

  checks:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - test
      - tidy-and-generate
    if: always()
    steps:
      - name: All tests ok
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: exit 0
      - name: Some tests failed or were cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
