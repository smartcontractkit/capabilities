name: CI

on: [push]

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.get-affected.outputs.affected }}
      base: ${{ steps.get-base.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup

      - name: Get base branch
        id: get-base
        run: echo "base=${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }}" >> "$GITHUB_OUTPUT"
      - name: Get affected projects
        id: get-affected
        run: echo "affected=$(./nx show projects --affected --json --base=${{steps.get-base.outputs.base}}" >> "$GITHUB_OUTPUT"

  affected-tasks:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects: ${{fromJson(needs.affected.outputs.affected)}}
        tasks: ["lint", "test"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup

      - name: ${{ matrix.tasks }} ${{ matrix.projects }}
        run: ./nx run ${{ matrix.projects }}:${{ matrix.tasks }} --base=${{needs.affected.outputs.base}}
