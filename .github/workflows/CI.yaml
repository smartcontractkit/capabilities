name: CI

on: [push]

env:
  # Ensure that a cached go version is used:
  # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#go
  GO_VERSION: 1.23

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      nxexcludeintegration: ${{ steps.affected.outputs.affectedex }}
      nx: ${{ steps.affected.outputs.affected }}
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0
      # There's no need to setup Node as it is pre-installed:
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md
      - name: Cache NX
        uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
        with:
          path: |
            .nx
            ~/.npm
          key: ${{ runner.os }}-nx
        # Outputs:
        # {
        #   "base": "main",
        #   "projects": [
        #     "project_name_1",
        #     "project_name_2",
        #   ],
        #   "project_name_1": {
        #     "root": "project_1_root",
        #     "go_sum": "project_1_root/go.sum"
        #   },
        #   "project_name_2": {
        #     "root": "project_2_root",
        #     "go_sum": "project_2_root/go.sum"
        #   }
        #   "run_checks": true
        # }
      - name: Init NX and get affected projects
        id: affected
        run: |
          npx nx@19.8.2 init
          echo "affected=$(./.github/scripts/affected-projects.sh ${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }})" >> $GITHUB_OUTPUT
          echo "affectedex=$(./.github/scripts/affected-projects.sh ${{ fromJSON('["origin/main", "origin/main~1"]')[github.ref == 'refs/heads/main'] }} exclude-integration-test)" >> $GITHUB_OUTPUT
          
  build:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "build"

      - name: Build ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} build

  test:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nxexcludeintegration).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nxexcludeintegration).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0
      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nxexcludeintegration)[matrix.projects].go_sum }}
          task: "test"
      - name: Test ${{ matrix.projects }}
        run: ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          # name artifacts differently per each report
          name: ${{ matrix.projects }}_go_test_results
          # the path to a generated report (per directory)
          path: |
            ./${{fromJson(needs.affected.outputs.nx)[matrix.projects].root}}/coverage.txt 

  integrationtest:
    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/chainlink_test?sslmode=disable
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0
      - name: Setup Postgres
        uses: ./.github/actions/setup-postgres
      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: integration_tests
          go-module-file: ./integration_tests
          task: "test"
      - name: Setup DB
        run: go run github.com/smartcontractkit/chainlink/v2 local db preparetest
        working-directory: integration_tests
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}
      - name: run integration_tests 
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}
        run: ./.github/scripts/nx-run-if-exists.sh integration_tests test

  tidy-and-generate:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 #4.1.7
        with:
          fetch-depth: 0

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "tidy-and-generate"

      - name: Install mockery
        run: go install github.com/vektra/mockery/v2/...@v2.46.1

      - name: Run "tidy" and "generate"
        run: |
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} tidy
          ./.github/scripts/nx-run-if-exists.sh ${{ matrix.projects }} generate

      - name: Ensure no diff
        run: git diff --stat --exit-code

  lint:
    needs: affected
    if: ${{fromJson(needs.affected.outputs.nx).run_checks}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projects: ${{fromJson(needs.affected.outputs.nx).projects}}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0

      - name: Set up project environment
        id: setup
        uses: ./.github/actions/setup
        with:
          project: ${{ matrix.projects }}
          go-module-file: ${{ fromJson(needs.affected.outputs.nx)[matrix.projects].go_sum }}
          task: "lint"

      - name: Golangci Lint (${{ matrix.projects }})
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: ${{fromJson(needs.affected.outputs.nx)[matrix.projects].root}}
          args: --timeout=15m --out-format colored-line-number,checkstyle:golangci-lint-report.xml

      - name: Upload Golangci Lint artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          # name artifacts differently per each report
          name: ${{ matrix.projects }}_golangci-lint-report
          # the path to a generated report (per directory)
          path: |
            ./${{fromJson(needs.affected.outputs.nx)[matrix.projects].root}}/golangci-lint-report.xml

  checks:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - test
      - tidy-and-generate
    if: always()
    steps:
      - name: All tests ok
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: exit 0
      - name: Some tests failed or were cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  sonarqube:
    name: SonarQube Scan
    needs: [test, lint]
    if: ${{ always() && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          fetch-depth: 0 # fetches all history for all tags and branches to provide more metadata for sonar reports

      - name: Download all reports
        uses: actions/download-artifact@v4.1.8 # v4.1.8

      - name: Set SonarQube Report Paths
        shell: bash
        run: |
          sonarqube_coverage_report_paths=$(find -type f -name 'coverage.txt' -printf "%p,")
          sonarqube_golangci_report_paths=$(find -type f -name 'golangci-lint-report.xml' -printf "%p,")
          ARGS=""
          ARGS="$ARGS -Dsonar.go.coverage.reportPaths=$sonarqube_coverage_report_paths"
          ARGS="$ARGS -Dsonar.go.golangci-lint.reportPaths=$sonarqube_golangci_report_paths"
          echo "SONARQUBE_ARGS=$ARGS" >> $GITHUB_ENV
          
      - name: SonarQube Scan
        if: always()
        uses: sonarsource/sonarqube-scan-action@53c3e3207fe4b8d52e2f1ac9d6eb1d2506f626c0 # v2.0.2
        with:
          args: ${{ env.SONARQUBE_ARGS }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

          