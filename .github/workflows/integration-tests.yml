name: Integration Tests

on:
  workflow_call:

env:
  GOPRIVATE: github.com/smartcontractkit/capabilities

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/chainlink_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Postgres
        uses: ./.github/actions/setup-postgres

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: integration_tests
          go-module-file: ./integration_tests/go.mod
          task: "integrationtest"

      - name: Support private Go modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/support-private-gomods.sh

      # This is used so we can run `pg_dump --restrict-key` for deterministic
      # schema dumps. This step can be removed once GitHub actions runners
      # support PostgreSQL v17+.
      # See: https://github.com/actions/runner-images/blob/main/images/ubuntu/toolsets/toolset-2404.json#L319
      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          # Add the official PostgreSQL Apt repo (supports Ubuntu 24.04 "noble")
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Ensure v17 tools (pg_dump, psql, pg_restore, etc.) are used
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Setup DB
        shell: bash
        run: |
          go get github.com/smartcontractkit/chainlink/v2/core/store/cmd/preparetest
          go run github.com/smartcontractkit/chainlink/v2/core/store/cmd/preparetest
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}

      - name: Run Integration Tests
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}
        run: ./nx run integration_tests:test
