name: bazel

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  GOPRIVATE: github.com/smartcontractkit/capabilities

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: bazel-contrib/setup-bazel@4fd964a13a440a8aeb0be47350db2fc640f19ca8 # 0.15.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.ref }}
      - name: Tidy and generate
        run: |
          bazel mod tidy
          bazel run //:gazelle --platforms=@rules_go//go/toolchain:linux_amd64_cgo --linkopt="-fuse-ld=bfd"
      - name: Ensure no diff
        run: |
          git diff
          git diff --stat --exit-code
      - name: Build, lint, and test
        run: bazel test //... --platforms=@rules_go//go/toolchain:linux_amd64_cgo --@rules_go//go/config:race --linkopt="-fuse-ld=bfd"
