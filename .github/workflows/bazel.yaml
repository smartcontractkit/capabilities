name: bazel

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  GOPRIVATE: github.com/smartcontractkit/capabilities

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ github.ref }}-${{ hashFiles('**/BUILD.bazel', '**/MODULE.bazel', '**/*.bzl') }}
          restore-keys: |
            ${{ runner.os }}-bazel-${{ github.ref }}-
            ${{ runner.os }}-bazel-
      - name: Tidy and generate
        run: |
          bazel mod tidy
          bazel run //:gazelle --config=ci
      - name: Ensure no diff
        run: |
          git diff
          git diff --stat --exit-code
      - name: Build, lint, and test
        run: bazel test //... --config=ci
