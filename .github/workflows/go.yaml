name: Go

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  GOPRIVATE: github.com/smartcontractkit/capabilities

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/chainlink_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Postgres
        uses: ./.github/actions/setup-postgres

      - name: Set up project environment
        uses: ./.github/actions/setup
        with:
          project: integration_tests
          go-module-file: ./integration_tests/go.mod
          task: "integrationtest"

      - name: Support private Go modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/support-private-gomods.sh

      - name: Setup Tests DB
        shell: bash
        run: |
          GOWORK=off go get github.com/smartcontractkit/chainlink/v2/core/store/cmd/preparetest@d2c56f4161f3431268cb52e717a77b7ea7dcef09
          GOWORK=off go run github.com/smartcontractkit/chainlink/v2/core/store/cmd/preparetest
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}

      - name: Install gomods
        run: go install github.com/jmank88/gomods@v0.1.6

      - name: Run All Go Tests
        env:
          CL_DATABASE_URL: ${{ env.DB_URL }}
        run: gomods -go test ./...
