name: "Set up project environment"
description: "Sets up nx and Go"
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5.0.2
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: false
    - name: Cache NX
      uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
      with:
        path: |
          .nx
          ~/.npm
        key: ${{ runner.os }}
    - run: npx nx@19.8.2 init # nx version is 19.8.2
      shell: bash
    - id: get-root
      run: echo "root=$(./nx show project ${{matrix.projects}} --json)" >> "$GITHUB_OUTPUT"
      shell: bash
