name: "Set up project environment"
description: "Sets up Go and NX"

inputs:
  cache-version:
    description: Set this to cache bust
    default: "1"
  go-module-file:
    description: Set where the go module file is located at
    required: true
  project:
    description: Project to set up
    required: true
  task:
    description: Task that will run. Used for caching purposes.
    required: true

runs:
  using: "composite"
  steps:
    - name: Get versions from asdf file
      id: versions
      shell: bash
      run: |
        echo "pnpm=$(grep -E '^pnpm \d.*$' .tool-versions | awk '{print $2}')" | tee -a "$GITHUB_OUTPUT"

    - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      name: Install pnpm
      with:
        version: ${{ steps.versions.outputs.pnpm }}
        run_install: true

    - name: Set up Go
      uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # 5.0.2
      with:
        go-version: ${{ env.GO_VERSION }}
        # We are doing custom caching, so we don't need the default caching
        cache: false
    - name: Cache NX
      uses: actions/cache@v4
      with:
        path: |
          .nx
          ~/.npm
        key: ${{runner.os}}-nx

    - name: Initialize NX and set up Go cache keys
      id: init
      shell: bash
      run: |
        npx nx@19.8.2 init
        echo "gomodcache=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo "gobuildcache=$(go env GOCACHE)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      name: Cache Go modules and outputs
      with:
        path: |
          ${{ steps.init.outputs.gomodcache }}
          ${{ steps.init.outputs.gobuildcache }}
        key: ${{runner.os}}-${{inputs.cache-version}}-${{inputs.project}}-${{inputs.task}}-gomod-${{hashFiles(inputs.go-module-file)}}
        restore-keys: |
          ${{runner.os}}-${{inputs.cache-version}}-${{inputs.project}}-${{inputs.task}}
        save-always: true
