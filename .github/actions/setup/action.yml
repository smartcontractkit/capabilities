name: "Set up project environment"
description: "Sets up Node and installs NX"
runs:
  using: "composite"
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        registry-url: "https://registry.npmjs.org"
    - uses: actions/setup-go@v5
      with:
        go-version: 1.23
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v3
      with:
        node-version: 20
    - run: npx nx init
      shell: bash
