name: "Set up project environment"
description: "Sets up Go and NX"

inputs:
  cache-version:
    description: Set this to cache bust
    default: "1"
  go-module-file:
    description: Set where the go module file is located at
    required: true
  project:
    description: Project to set up
    required: true
  task:
    description: Task that will run. Used for caching purposes.
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # 5.0.2
      with:
        go-version: ${{ env.GO_VERSION }}
        # We are doing custom caching, so we don't need the default caching
        cache: false
    - name: Cache NX
      uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
      with:
        path: |
          .nx
          ~/.npm
        key: ${{runner.os}}-nx

    - run: npx nx@19.8.2 init # nx version is 19.8.2
      shell: bash

    - name: Set go cache keys
      shell: bash
      id: go-cache-dir
      run: |
        echo "gomodcache=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo "gomodcache=$(go env GOMODCACHE)"
        echo "gobuildcache=$(go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "gobuildcache=$(go env GOCACHE)"

    - name: Get branch name
      if: ${{ inputs.only-modules == 'false' }}
      id: branch-name
      uses: tj-actions/branch-names@6871f53176ad61624f978536bbf089c574dc19a2 # v8.0.1

    - uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
      name: Cache Go Modules
      with:
        path: ${{ steps.go-cache-dir.outputs.gomodcache }}
        # The lifetime of go modules is much higher than the build outputs, so we increase cache efficiency
        # here by not having the primary key contain the branch name
        key: ${{runner.os}}-${{inputs.cache-version}}-${{inputs.project}}-${{inputs.task}}-gomod-${{hashFiles(inputs.go-module-file)}}
        restore-keys: |
          ${{runner.os}}-${{inputs.cache-version}}-${{inputs.project}}-${{inputs.task}}

    - uses: actions/cache@2cdf405574d6ef1f33a1d12acccd3ae82f47b3f2 # v4.1.0
      name: Cache Go Build Outputs
      with:
        path: ${{ steps.go-cache-dir.outputs.gobuildcache }}
        # The lifetime of go build outputs is pretty short, so we make our primary cache key be the branch name
        key: ${{runner.os}}-${{inputs.cache-version}}-gobuild-${{hashFiles(inputs.go-module-file)}}-project-${{inputs.project}}-task-${{inputs.task}}-branch-${{steps.branch-name.outputs.current_branch}}
        restore-keys: |
          ${{runner.os}}-${{inputs.cache-version}}-gobuild-${{hashFiles(inputs.go-module-file)}}-project-${{inputs.project}}-task-${{inputs.task}}
