syntax = "proto3";

option go_package = "consensus/oracle/types";



package value_consensus_types;

import "google/protobuf/timestamp.proto";

enum RequestType {
  VALUE_CONSENSUS = 0;
  REPORT_GENERATION = 1;
}

message RequestMetaData {
  string request_id = 1;
  string workflow_execution_id = 2;
  string workflow_step_reference = 3;
  string workflow_id = 4;
  string workflow_owner = 5;
  string workflow_name = 6;
  uint32 workflow_don_id = 7;
  uint32 workflow_don_config_version = 8;

  string report_id = 9;

  string keyBundleId = 10;

  RequestType request_type = 11;
}

message Request {
  RequestMetaData metadata = 1;
  bytes request_consensus_descriptor = 2;
  bytes request_default = 3;
}


message Query {
  repeated Request requests = 1;
}

message RequestObservation {
  RequestMetaData metadata = 1;
  bytes observation = 2;
  google.protobuf.Timestamp received_at = 3;
}

message Observation {
  repeated RequestObservation observations = 1;
}

// TODO as part of https://smartcontract-it.atlassian.net/browse/CAPPL-1076 add additional statuses  (errored, failed etc.....):
enum RequestStatus {
  REQUEST_STATUS_CONSENSUS_SUCCESS = 0;
  REQUEST_STATUS_CONSENSUS_PENDING = 1;
}

message RequestOutcome {
  RequestMetaData metadata = 1;
  bytes outcome = 2;
  google.protobuf.Timestamp timestamp = 3;
  RequestStatus status = 4;
}

message HistoricalRequestOutcome {
  string request_id = 1;
  RequestStatus status = 2;
  uint64 first_seen_at_seq_nr = 3;
}

message Outcome {
  repeated RequestOutcome outcomes = 1;

  // A record of recent historical request outcomes, expired based on the sequence number of the consensus round in which they were first seen.
  // It does not include the actual outcome data to save space in the plugin outcome.  (Note, this prevents it from being used by nodes to recover from
  // missed outcomes, but that is not a use case we currently support and there are different options to address this use case, i.e. a decentralised store)
  repeated HistoricalRequestOutcome historical_outcomes = 2;
}